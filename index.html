<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whatfix Studio Prototype</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="relative h-screen w-full overflow-hidden bg-black font-sans antialiased text-[#1F1F32]">

  <div class="absolute inset-0 z-0 overflow-hidden bg-[#eef1f6] flex flex-col">
    <div class="bg-[#032d60] text-white px-3 flex items-center gap-3 h-12 shrink-0">
      <div class="w-7 h-7 bg-[#0176d3] rounded flex items-center justify-center font-bold text-[10px]">⋮⋮</div>
      <span class="font-semibold">Sales Console</span>
    </div>
    <div class="flex-1 flex items-center justify-center text-[#8C899F]">
      Salesforce Background App...
    </div>
  </div>

  <div class="absolute top-0 right-0 h-full flex z-50 shadow-[-12px_0_30px_rgba(0,0,0,0.15)]">
    
    <div class="w-12 bg-[#1a1a2e] flex flex-col items-center py-2 gap-0.5 shrink-0 z-10 text-white text-base">
      <button class="w-9 h-9 flex items-center justify-center rounded-md text-[#d45f00] hover:bg-white/10">🔥</button>
      <button class="w-9 h-9 flex items-center justify-center rounded-md text-white/55 hover:bg-white/10 hover:text-white">☁</button>
      <button class="w-9 h-9 flex items-center justify-center rounded-md bg-white/10 text-white">🏠</button>
      <button class="w-9 h-9 flex items-center justify-center rounded-md text-white/55 hover:bg-white/10 hover:text-white">＋</button>
    </div>

    <div class="w-[380px] min-w-[380px] bg-white border-l border-[#e0e0e0] flex flex-col h-full z-10">
      <header class="p-3 px-4 border-b border-[#ebebeb] flex items-center justify-between shrink-0">
        <div class="font-semibold text-[15px]">Studio</div>
        <div class="flex gap-1">
          <button class="text-[#8C899F] hover:bg-[#f0f0f0] rounded w-[22px] h-[22px]">✕</button>
        </div>
      </header>
      
      <div class="flex-1 overflow-y-auto p-5">
        <h2 class="text-[17px] font-bold leading-snug mb-4">Studio: Guide. Track. Get feedback. In context.</h2>
        <p class="text-[13px] text-[#8C899F] mb-4">You can build out all your panels right here using standard Tailwind classes.</p>
        
        <button class="w-full py-2.5 bg-[#d45f00] text-white rounded-md text-sm font-semibold hover:bg-[#b85200]">
          ＋ Define event
        </button>
      </div>
    </div>
  </div>

</body>
</html>
