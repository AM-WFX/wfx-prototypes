<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whatfix Studio Editor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
    /* Vertical line connecting flowchart nodes */
    .flow-edge-line {
      position: absolute;
      left: 23px; /* Centers under the 48px tall/wide node start area */
      top: 48px;
      width: 2px;
      height: 24px;
      background-color: #c8d7d9;
      z-index: 0;
    }
  </style>
</head>
<body class="bg-white font-['Inter'] text-[14px] antialiased text-[#1F1F32] overflow-hidden select-none">

  <div id="view-studio" class="h-screen w-full relative overflow-hidden z-50">
    
    <div id="target-sandbox" class="absolute inset-0 z-0 overflow-hidden bg-[#eef1f6] flex flex-col text-[13px]">
      <div class="sandbox-header h-[48px] bg-[#032d60] text-white px-3 flex items-center gap-3 shrink-0">
        <div class="w-7 h-7 bg-[#0176d3] rounded flex items-center justify-center font-bold text-[10px]">
          <svg class="icon icon-tabler icon-tabler-grid-dots" width="16" height="16" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><circle cx="5" cy="5" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="19" cy="5" r="1"></circle><circle cx="5" cy="12" r="1"></circle><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle><circle cx="5" cy="19" r="1"></circle><circle cx="12" cy="19" r="1"></circle><circle cx="19" cy="19" r="1"></circle></svg>
        </div>
        <span class="font-semibold text-xs tracking-wide">Sales Console Sandbox</span>
      </div>
      
      <div class="sandbox-canvas flex-1 flex overflow-hidden p-3 gap-3">
        <div class="sandbox-left-col w-[250px] shrink-0 bg-white border border-slate-200 rounded-lg p-4 shadow-sm space-y-3">
          <div class="flex items-center gap-2">
            <div id="crm-avatar-node" class="w-7 h-7 bg-[#5b6af5] rounded flex items-center justify-center text-white font-bold">▦</div>
            <span class="font-bold text-sm text-[#1F1F32]">ACME Corp</span>
          </div>
          <button class="w-full py-1.5 border border-slate-200 text-[#0176d3] rounded hover:bg-slate-50 transition-colors text-xs font-semibold">+ Follow Record</button>
        </div>
        <div class="sandbox-workspace flex-1 bg-white border border-slate-200 rounded-lg shadow-sm flex flex-col overflow-hidden">
          <div class="p-4 bg-slate-50 border-b border-slate-200 text-xs font-bold text-slate-600">Active Node Frame Workspace</div>
          <div class="flex-1 p-6 flex items-center justify-center text-center text-slate-400 text-xs leading-relaxed max-w-sm mx-auto">
            Sandbox framework matrix layer active.
          </div>
        </div>
      </div>
    </div>

    <div id="studio-preview-overlay" class="absolute bottom-[24px] left-0 w-full flex justify-center pointer-events-none z-[9900]">
      <div class="preview-pagination pointer-events-auto bg-white shadow-lg border border-[#e5e7eb] rounded-[8px] flex items-center p-1 gap-0.5">
        <button class="p-2 text-[#d7d6d1] cursor-not-allowed rounded"><svg class="icon icon-tabler icon-tabler-chevron-left" width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path stroke="none" d="M0 0h24v24H0z" fill="none"></path><path d="M15 6l-6 6l6 6"></path></svg></button>
        <button class="w-[32px] h-[32px] flex items-center justify-center text-[13px] font-semibold text-[#1f1f32] bg-[#f2f2f8] rounded">1</button>
        <button class="w-[32px] h-[32px] flex items-center justify-center text-[13px] font-medium text-[#6b697b] hover:bg-gray-50 rounded transition-colors">2</button>
        <button class="w-[32px] h-[32px] flex items-center justify-center text-[13px] font-medium text-[#6b697b] hover:bg-gray-50 rounded transition-colors">3</button>
        <button class="w-[32px] h-[32px] flex items-center justify-center text-[#6b697b] hover:bg-gray-50 rounded transition-colors"><svg class="icon icon-tabler icon-tabler-flag" width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path stroke="none" d="M0 0h24v24H0z" fill="none"></path><path d="M5 5a5 5 0 0 1 7 0a5 5 0 0 0 7 0v9a5 5 0 0 1 -7 0a5 5 0 0 0 -7 0v-9z"></path><path d="M5 21v-7"></path></svg></button>
        <button class="p-2 text-[#6b697b] hover:bg-gray-50 rounded transition-colors"><svg class="icon icon-tabler icon-tabler-chevron-right" width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path stroke="none" d="M0 0h24v24H0z" fill="none"></path><path d="M9 6l6 6l-6 6"></path></svg></button>
      </div>
    </div>

    <div id="studio-editor-panel" class="absolute top-0 right-0 w-[380px] h-full bg-white flex flex-col shadow-[-16px_0_35px_rgba(0,0,0,0.12)] z-[9999] border-l border-[#dfdde7]">
      
      <div class="editor-header-banner bg-[#f0f4fc] border-b border-[#e5e7eb] p-4 flex flex-col gap-3 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-32 h-32 bg-blue-100 rounded-full blur-3xl opacity-50 pointer-events-none -z-10"></div>
        
        <div class="banner-actions flex justify-between items-start z-10">
          <a href="dvm.html" class="p-1.5 text-[#6b697b] hover:bg-white/50 rounded transition-colors" title="Back">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"></path></svg>
          </a>
          <div class="window-controls flex items-center gap-1">
            <button class="p-1.5 text-[#6b697b] hover:bg-white/50 rounded transition-colors" title="Move Left">
              <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M10 12l10 0M10 12l4 4M10 12l4 -4M4 4l0 16"></path></svg>
            </button>
            <button class="p-1.5 text-[#6b697b] hover:bg-white/50 rounded transition-colors" title="Minimize">
              <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M5 12l14 0"></path></svg>
            </button>
            <a href="dvm.html" class="p-1.5 text-[#6b697b] hover:bg-white/50 rounded transition-colors" title="Close">
              <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M18 6l-12 12M6 6l12 12"></path></svg>
            </a>
          </div>
        </div>

        <div class="banner-text z-10 pr-8">
          <h6 class="text-[14px] font-semibold text-[#1f1f32]">Studio: <span class="font-normal text-[#3d3c52]">Guide. Track. Get feedback. In context. All in one place.</span></h6>
        </div>
      </div>

      <div class="editor-flow-title px-4 py-3 border-b border-[#e5e7eb] flex items-center justify-between bg-white shrink-0">
        <div class="title-input-area flex items-center gap-2 flex-1">
          <svg class="text-[#6b697b]" width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path stroke="none" d="M0 0h24v24H0z" fill="none"></path><circle cx="7" cy="18" r="2"></circle><circle cx="7" cy="6" r="2"></circle><circle cx="17" cy="6" r="2"></circle><line x1="7" y1="8" x2="7" y2="16"></line><path d="M9 18h6a2 2 0 0 0 2 -2v-5"></path><polyline points="14 14 17 11 20 14"></polyline></svg>
          <input type="text" value="Test" class="text-[16px] font-semibold text-[#1f1f32] bg-transparent outline-none w-full hover:bg-gray-50 focus:bg-white focus:ring-1 focus:ring-blue-500 px-1 rounded transition-all">
        </div>
        <button class="btn-details border border-[#d7d6d1] px-3 py-1.5 rounded text-[12px] font-semibold text-[#3d3c52] hover:bg-gray-50 transition-colors">
          Details
        </button>
      </div>

      <div class="editor-main-body flex-1 overflow-y-auto custom-scrollbar bg-white flex flex-col">
        
        <div class="ai-enhance-container p-4 pb-2 shrink-0">
          <button class="w-auto px-4 py-2 bg-blue-50 text-[#0975d7] rounded-[6px] text-[13px] font-semibold flex items-center gap-2 hover:bg-blue-100 transition-colors border border-blue-100">
            <svg width="16" height="16" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M12 3l1.5 5.5L19 10l-5.5 1.5L12 17l-1.5-5.5L5 10l5.5-1.5z"></path></svg> 
            Enhance with AI ▾
          </button>
        </div>

        <div class="flowchart-wrapper p-4 pt-2 flex-1 flex flex-col">
          <div class="mb-4">
            <span class="text-[14px] font-bold text-[#1f1f32]">3 Steps</span>
          </div>

          <div class="flowchart-nodes flex flex-col relative pl-2">
            
            <div class="flow-node flex items-center border border-[#e5e7eb] rounded-[6px] h-[48px] bg-white shadow-sm mb-[24px] relative z-10 hover:border-[#0975d7] transition-colors cursor-pointer group">
              <div class="w-[48px] h-full flex items-center justify-center font-semibold text-[#3d3c52] text-[13px]">1</div>
              <div class="flex-1 text-[13px] text-[#1f1f32] font-medium truncate">Click here</div>
              <div class="w-[80px] h-full flex items-center justify-end pr-2 opacity-0 group-hover:opacity-100 transition-opacity gap-1">
                <button class="p-1.5 text-[#d45f00] hover:bg-orange-50 rounded"><svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><circle cx="7" cy="18" r="2"></circle><circle cx="7" cy="6" r="2"></circle><circle cx="17" cy="6" r="2"></circle><line x1="7" y1="8" x2="7" y2="16"></line><path d="M9 18h6a2 2 0 0 0 2 -2v-5"></path><polyline points="14 14 17 11 20 14"></polyline></svg></button>
                <button class="p-1.5 text-[#6b697b] hover:bg-gray-100 rounded"><svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><circle cx="5" cy="12" r="1"></circle><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle></svg></button>
              </div>
              <div class="flow-edge-line"></div>
            </div>

            <div class="flow-node flex items-center border border-[#e5e7eb] rounded-[6px] h-[48px] bg-white shadow-sm mb-[24px] relative z-10 hover:border-[#0975d7] transition-colors cursor-pointer group">
              <div class="w-[48px] h-full flex items-center justify-center font-semibold text-[#3d3c52] text-[13px]">2</div>
              <div class="flex-1 text-[13px] text-[#1f1f32] font-medium truncate">Click 'I am lucky.'</div>
              <div class="w-[80px] h-full flex items-center justify-end pr-2 opacity-0 group-hover:opacity-100 transition-opacity gap-1">
                <button class="p-1.5 text-[#d45f00] hover:bg-orange-50 rounded"><svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><circle cx="7" cy="18" r="2"></circle><circle cx="7" cy="6" r="2"></circle><circle cx="17" cy="6" r="2"></circle><line x1="7" y1="8" x2="7" y2="16"></line><path d="M9 18h6a2 2 0 0 0 2 -2v-5"></path><polyline points="14 14 17 11 20 14"></polyline></svg></button>
                <button class="p-1.5 text-[#6b697b] hover:bg-gray-100 rounded"><svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><circle cx="5" cy="12" r="1"></circle><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle></svg></button>
              </div>
              <div class="flow-edge-line"></div>
            </div>

            <div class="flow-node flex items-center border border-[#e5e7eb] rounded-[6px] h-[48px] bg-white shadow-sm mb-[24px] relative z-10 hover:border-[#0975d7] transition-colors cursor-pointer group">
              <div class="w-[48px] h-full flex items-center justify-center font-semibold text-[#3d3c52] text-[13px]">3</div>
              <div class="flex-1 text-[13px] text-[#1f1f32] font-medium truncate">Click here</div>
              <div class="w-[80px] h-full flex items-center justify-end pr-2 opacity-0 group-hover:opacity-100 transition-opacity gap-1">
                <button class="p-1.5 text-[#d45f00] hover:bg-orange-50 rounded"><svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><circle cx="7" cy="18" r="2"></circle><circle cx="7" cy="6" r="2"></circle><circle cx="17" cy="6" r="2"></circle><line x1="7" y1="8" x2="7" y2="16"></line><path d="M9 18h6a2 2 0 0 0 2 -2v-5"></path><polyline points="14 14 17 11 20 14"></polyline></svg></button>
                <button class="p-1.5 text-[#6b697b] hover:bg-gray-100 rounded"><svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><circle cx="5" cy="12" r="1"></circle><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle></svg></button>
              </div>
              <div class="flow-edge-line"></div>
            </div>

            <button class="flow-node-add flex items-center justify-center border border-dashed border-[#d7d6d1] rounded-[6px] h-[48px] bg-[#f9fafb] mb-[24px] hover:bg-white hover:border-[#0975d7] hover:text-[#0975d7] transition-colors text-[#6b697b] text-[13px] font-semibold gap-2 relative z-10">
              <svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              Add Step
              <div class="flow-edge-line"></div>
            </button>

            <div class="flow-node-end flex items-center border border-[#e5e7eb] rounded-[6px] h-[48px] bg-white shadow-sm relative z-10 hover:border-[#d7d6d1] transition-colors cursor-pointer group">
              <div class="w-[48px] h-full flex items-center justify-center text-[#6b697b]">
                <svg width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M5 14h14v-9h-14v16"></path></svg>
              </div>
              <div class="flex-1 text-[13px] text-[#1f1f32] font-medium truncate">End Message</div>
              <div class="w-[40px] h-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                <button class="p-1.5 text-[#6b697b] hover:bg-gray-100 rounded"><svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><circle cx="5" cy="12" r="1"></circle><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle></svg></button>
              </div>
            </div>

          </div>
        </div>

      </div>

      <div class="editor-footer p-4 border-t border-[#e5e7eb] bg-white shrink-0 flex items-center justify-between">
        <button class="px-4 py-2 border border-transparent text-[#6b697b] text-[13px] font-semibold rounded-[4px] hover:bg-gray-50 transition-colors">Discard</button>
        <div class="flex items-center gap-2">
          <button class="px-5 py-2 border border-[#d7d6d1] text-[#1f1f32] text-[13px] font-semibold rounded-[4px] hover:bg-gray-50 transition-colors">Preview</button>
          <button class="px-5 py-2 bg-[#d45f00] text-white text-[13px] font-semibold rounded-[4px] hover:bg-[#b85200] transition-colors shadow-sm">Save Flow</button>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
